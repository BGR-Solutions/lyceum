services:
  postgres:
    image: postgres:15
    container_name: lyceum_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lyceum_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  academic:
    build:
      context: .
      dockerfile: academic/Dockerfile
    container_name: lyceum_academic
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
    ports:
      - "8080:8080"

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    container_name: lyceum_notification
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
    ports:
      - "8081:8081"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lyceum_frontend
    depends_on:
      - academic
    ports:
      - "4173:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: lyceum_prometheus
    volumes:
      - ./prometheus.yml
    ports:
      - "9090:9090"

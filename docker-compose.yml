services:
  postgres:
    image: postgres:15
    container_name: lyceum_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/initdb:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lyceum_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  academic:
    build:
      context: .
      dockerfile: academic/Dockerfile
    container_name: lyceum_academic
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
    ports:
      - "8080:8080"

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    container_name: lyceum_notification
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
    ports:
      - "8081:8081"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lyceum_frontend
    depends_on:
      - academic
    ports:
      - "4173:80"

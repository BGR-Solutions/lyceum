name: Build and Test Backend (Java) + Frontend (Node.js)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven tests
        run: mvn test -pl academic,notification

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: |
            academic/target/surefire-reports/*.xml
            notification/target/surefire-reports/*.xml

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run Vitest
        run: npm run test:unit --prefix frontend -- --reporter=junit --outputFile=vitest-results.xml

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tests
          path: frontend/vitest-results.xml

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright e2e tests
        run: npx playwright test --reporter=junit
        working-directory: frontend
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/results.xml

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e
          path: frontend/test-results/results.xml

# ── CLOUD PROFILE ──────────────────────────────────────────────────────────────
# Usado em deploy de nuvem. Todas as variáveis são obrigatórias.

spring:
  jpa:
    show-sql: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:notificationdb}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  # Opção A: host/porta/usuário individuais
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}

  # Opção B: URL AMQP completa (CloudAMQP, AWS MQ, etc.)
  # rabbitmq:
  #   addresses: ${RABBIT_URL}

logging:
  structured:
    format:
      console: ecs

# -- DB LOCAL PROFILE
# Banco de dados para desenvolvimento local. Edite conforme sua instalacao.

spring:
  # Opcao A (padrao): PostgreSQL local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/notificationdb
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true


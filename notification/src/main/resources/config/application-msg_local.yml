# ── MSG LOCAL PROFILE ─────────────────────────────────────────────────────────────
# Mensageria local ou via serviço de nuvem.
# Edite este arquivo para ajustar credenciais locais.

spring:
  # Opção A: host/porta/usuário individuais (RabbitMQ local ou Docker Compose na porta padrão)
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

  # Opção B: URL AMQP completa (CloudAMQP, AWS MQ, etc.)
  # Substitua o bloco rabbitmq acima por:
  # rabbitmq:
  #   addresses: ${RABBIT_URL}   # ex: amqps://user:pass@host/vhost

# ── CLOUD PROFILE ──────────────────────────────────────────────────────────────
# Usado em deploy de nuvem (AWS, Azure, GCP, etc.).
# Todas as variáveis são obrigatórias — nenhum valor padrão é definido.
# Exporte as variáveis de ambiente antes de iniciar a aplicação.

spring:
  jpa:
    show-sql: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:academicdb}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  # Opção A: host/porta/usuário individuais
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}

  # Opção B: URL AMQP completa (CloudAMQP, AWS MQ, etc.)
  # Substitua o bloco rabbitmq acima por:
  # rabbitmq:
  #   addresses: ${RABBIT_URL}   # ex: amqps://user:pass@host/vhost

logging:
  structured:
    format:
      console: ecs

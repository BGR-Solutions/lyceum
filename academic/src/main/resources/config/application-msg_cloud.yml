# ── MSG CLOUD PROFILE ─────────────────────────────────────────────────────────────
# Usado ao subir a solução de mensageria via serviço de nuvem.
# O host aponta para o nome do serviço declarado nas variáveis de ambiente.
# Credenciais podem ser sobrescritas por variáveis de ambiente.

spring:
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}
  
# ── DB LOCAL PROFILE ─────────────────────────────────────────────────────────────
# Usado ao subir a solução de banco de dados localmente ou por serviços de nuvem.
# O host aponta para o nome do serviço a ser utilizado.
# Credenciais podem ser sobrescritas por variáveis de ambiente.

spring:
  # Opcao A (padrao): PostgreSQL local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/academicdb
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true

  # Opcao B: H2 in-memory
  # datasource:
  #   url: jdbc:h2:mem:academicdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE

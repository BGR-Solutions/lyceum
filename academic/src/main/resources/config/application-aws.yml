spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/academicdb
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

rabbitmq:
  host: ${RABBIT_HOST}
  port: ${RABBIT_PORT:5672}
  username: ${RABBIT_USER}
  password: ${RABBIT_PASS}

# ── DB CLOUD PROFILE ─────────────────────────────────────────────────────────────
# Usado ao subir a solução de banco de dados via serviço de nuvem.
# O host aponta para o nome do serviço declarado nas variáveis de ambiente.
# Credenciais podem ser sobrescritas por variáveis de ambiente.

spring:
  jpa:
    show-sql: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

# ── LOCAL PROFILE ──────────────────────────────────────────────────────────────
# Edite este arquivo para corresponder à sua instalação local.
# Nenhuma variável de ambiente é necessária neste profile.

spring:
  jpa:
    show-sql: true

  # ── Banco de dados (PostgreSQL local) ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/academicdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Para usar H2 in-memory (sem PostgreSQL instalado), substitua datasource acima:
  # datasource:
  #   url: jdbc:h2:mem:academicdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
  #   driver-class-name: org.h2.Driver
  #   username: sa
  #   password: ""
  # jpa:
  #   hibernate:
  #     ddl-auto: create-drop
  # flyway:
  #   enabled: false

  # ── Mensageria (RabbitMQ local) ────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # Para usar um serviço AMQP em nuvem (ex: CloudAMQP), substitua rabbitmq acima:
  # rabbitmq:
  #   addresses: amqps://user:password@host/vhost

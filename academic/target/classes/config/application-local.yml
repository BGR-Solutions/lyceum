spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/academicdb
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

rabbitmq:
  host: localhost
  port: 5672
  username: ${RABBIT_USER:guest}
  password: ${RABBIT_PASS:guest}
